name: build deb

on: 
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          submodules: true
          fetch-depth: 0

      - name: Prepare Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          export THEOS=$HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          # 检查sdks目录是否存在，如果存在就删除
          if [ -d "$HOME/theos/sdks" ]; then
            rm -rf "$HOME/theos/sdks"
          fi
          git clone --recursive https://github.com/theos/sdks.git $HOME/theos/sdks

      - name: Setup GNU Make
        run: |
          echo "$(brew --prefix)/opt/make/libexec/gnubin" >> $GITHUB_PATH

      - name: Build package
        run: |
          rm -f packages/*
          rm -rf .theos
          make package FINALPACKAGE=1 -j$(sysctl -n hw.ncpu)
          make package THEOS_PACKAGE_SCHEME=rootless FINALPACKAGE=1 -j$(sysctl -n hw.ncpu)
          make package THEOS_PACKAGE_SCHEME=roothide FINALPACKAGE=1 -j$(sysctl -n hw.ncpu)

      - name: Upload specific Deb packages
        uses: actions/upload-artifact@v4.6.0
        with:
          name: DYYY
          path: ${{ github.workspace }}/packages/*.deb
